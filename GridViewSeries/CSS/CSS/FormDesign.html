<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Hourly Production Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #c6dfe9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            width: 100%;
            padding: 10px 0;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            /* Gradient like your image */
            background: linear-gradient(to right, #6a11cb, #2575fc);
            /* Shadow effect */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            /* Rounded edges */
            border-radius: 5px;
            margin: 10px auto;
            max-width: 95%;
        }
    </style>
   
</head>
<body>
    <div class="header">
        Hourly Production Sheet
    </div>

</body>
</html>
