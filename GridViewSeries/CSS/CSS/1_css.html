<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>CSS Introduction</title>
    <!--CSS Coding just after title or in separate file denoted as style tag--> 
    <style>
        h1{
            font-size:50px;
            color:#f7f2f2;
            background-color:#2055a9
        }

        h2{
            background-color:#4cff00;
        }
    .bg-orange{
        background-color:#dcc120;
    }

    #bg_green{
        background-color:#51be2c;
    }

    </style>


</head>
<body>
    <h1> CSS Intro H1 Tag</h1>

    <h2>  Inline is denoted in css as actual like h2 {background-color:#4cff00;} </h2>

    <h3 class="bg-orange"> css as .classname like bg-orange{ background-color:#51be2c }; </h3>



    <h2>CSS Specificity</h2>
    <h4>Inline</h4>
    <h4>ID</h4>
    <h4>class</h4>
    <h4>Element</h4>


    <h3 class="bg-orange" id="bg_green"> id first then class later like #bg-green{ background-color:#f7e514 }; </h3>





</body>
</html>
